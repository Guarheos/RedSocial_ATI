<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chATI - Red Social para Estudiantes</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/Publicationstyle.css">

</head>
<body>
    <header>
        <div class="LogInDivRight">
            <div class="LogInSearch">
                <a href="#" id="LogInSearchIcon"></a>
            </div>
            <div class="LogInGlobe">
                <a href="#" id="LogInGlobeIcon"></a>
            </div>
            <div class="LogInLogout">
                <a href="#" id="LogInLogoutLink">CERRAR SESIÓN</a>
            </div>
        </div>
        <div class="LogInLogoContainer">
            <img src="../images/Logo.png" alt="Logo de chATI" id="LPLogo">
        </div>
        <div class="LogInDivLeft">
            <div class="LogInPublish">
                <a href="#" id="LogInPublishIcon"></a>
            </div>
            <div class="LogInChat">
                <a href="#" id="LogInChatIcon"></a>
            </div>
            <div class="LogInLike">
                <a href="#" id="LogInLikeIcon"></a>
            </div>
            <div class="LogInProfile">
                <a href="#" id="LogInProfileIcon"></a>
            </div>
            <div class="LogInHome">
                <a href="#" id="LogInHomeIcon"></a>
            </div>
        </div>
    </header>

    <main class="PubMain">
        <section class="PubBox">
            <div class="PubPreview" id="PubPreview">
                <!-- El preview multimedia aparece aquí si se sube algo -->
                <span class="PubPreviewPlaceholder">Vista previa de la publicación...</span>
              </div>
          <div class="PubTop">
            <div class="MPUserPhoto"></div>
            <textarea 
              placeholder="¿Qué deseas publicar?" 
              class="PubTextarea" 
              rows="3"></textarea>
            <button class="PubSend">Publicar</button>
          </div>
      

      
          <div class="PubTools">
            <button class="PubBtnEmoji" title="Agregar Emoji"></button>
            <button class="PubBtnPhoto" title="Subir Imagen"></button>
            <button class="PubBtnFile" title="Adjuntar Archivo"></button>
          </div>
        </section>
      </main>
      
      
    <footer class="MobileFooter">
        <div class="MobileDiv">
            <div class="MobileSearch">
                <a href="#" id="MobileSearchIcon"></a>
            </div>
            </div>
            <div class="MobilePublish">
                <a href="#" id="MobilePublishIcon"></a>
            </div>
            <div class="MobileChat">
                <a href="#" id="MobileChatIcon"></a>
            </div>
            <div class="MobileLike">
                <a href="#" id="MobileLikeIcon"></a>
            </div>
            <div class="MobileProfile">
                <a href="#" id="MobileProfileIcon"></a>
            </div>
        </div>
    </footer>
</body>
</html>
