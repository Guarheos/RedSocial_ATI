{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chATI - Red Social para Estudiantes</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/LogInstyle.css' %}">
</head>
<body>
    <header>
        <img src="{% static 'images/Logo.png' %}" alt="Logo de chATI" id="LPLogo">
        <div class="LPHDiv">
            <a href="#" id="LPGlobe"></a>
        </div>
    </header>

    <main class="LNMain">
        <h1>Iniciar sesión</h1>
        
        <!-- Display error messages -->
        {% if messages %}
        <div class="error-messages">
            {% for message in messages %}
            <p>{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}
        
        <form method="POST" action="{% url 'login' %}" class="LNform-container">
            {% csrf_token %}
            <div class="LNFInputs">
                <!-- Use Django form fields instead of raw inputs -->
                <p id="LNFUser">Usuario</p>
                {{ form.username }}
                
                <p id="LNFPass">Contraseña</p>
                {{ form.password }}
            </div>
            <button type="submit">INICIA SESIÓN</button>
            <div class="LNRButtons">
                <a href="{% url 'signin' %}" class="button">REGÍSTRATE</a>
                <a href="{% url 'password_recover' %}" class="button" id="LNRButtonsRC">RECUPERAR CONTRASEÑA</a>
            </div>
        </form>
    </main>
</body>
</html>
