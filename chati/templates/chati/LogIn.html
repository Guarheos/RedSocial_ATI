{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chATI - Red Social para Estudiantes</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/LogInstyle.css' %}">
</head>
<body>
    <header>
        <img src="{% static 'images/Logo.png' %}" alt="Logo de chATI" id="LPLogo">
        <div class="LPHDiv">
            <a href="#" id="LPGlobe"></a>
          </div>
    </header>

    <main class="LNMain">
        <h1>Iniciar sesión</h1>
        <div class="LNform-container">
            <div class="LNFInputs">            
                <p id="LNFUser">Usuario</p>
                <input type="text">
                <p id="LNFPass">Contraseña</p>
                <input type="text">
            </div>
            <button>INICIA SESIÓN</button>
            <div class="LNRButtons">
                <button>REGISTRATE</button>
                <button id="LNRButtonsRC">RECUPERAR CONTRASEÑA</button>
            </div>
          </div>
    </main>
</body>
</html>
