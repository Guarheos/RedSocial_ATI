{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chATI - Red Social para Estudiantes</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/Publicationstyle.css' %}">
    <script src="{% static 'js/MobilePopup.js' %}"></script>
    <script src="{% static 'js/SearchPopUp.js' %}"></script>

</head>
<body>
    <header>
        <div class="LogInDivRight">
            <div class="LogInSearch">
                <a href="#" id="LogInSearchIcon"></a>
            </div>
            <div id="popupSearch" style="display:none;" class="popup-container">
                <div class="popup-content">
                    <input type="text" id="userSearchInput" placeholder="Buscar usuarios..." />
                    <ul id="searchResults"></ul>
                </div>
            </div>
            <div class="LogInGlobe">
                <a href="#" id="LogInGlobeIcon"></a>
            </div>
            <div class="LogInLogout">
                <a href="{% url 'logout' %}" id="LogInLogoutLink">CERRAR SESIÓN</a>
            </div>
        </div>
        <div class="LogInLogoContainer">
            <img src="{% static 'images/Logo.png' %}" alt="Logo de chATI" id="LPLogo">
        </div>
        <div class="LogInDivLeft">
            <div class="LogInPublish">
                <a href="{% url 'feed-post' %}" id="LogInPublishIcon"></a>
            </div>
            <div class="LogInChat">
                <a href="{% url 'feed-chat' %}" id="LogInChatIcon"></a>
            </div>
            <div class="LogInLike">
                <a href="{% url 'feed-notifications' %}" id="LogInLikeIcon"></a>
            </div>
            <div class="LogInProfile">
                <a href="{% url 'own-profile' %}" id="LogInProfileIcon"></a>
            </div>
            <div class="LogInHome">
                <a href="{% url 'feed' %}" id="LogInHomeIcon"></a>
            </div>
       </div>
    </header>

    <main class="PubMain">
    <section class="PubBox">
        <form method="post" action="{% url 'feed-post' %}">
            {% csrf_token %}
            <div class="PubPreview" id="PubPreview">
                <span class="PubPreviewPlaceholder">Vista previa de la publicación...</span>
            </div>
            <div class="PubTop">
                {{ form.text_content }}
                <button type="submit" class="PubSend">PUBLICAR</button>
            </div>
            <div class="PubTools">
                <button type="button" class="PubBtnEmoji" title="Agregar Emoji"></button>
                <button type="button" class="PubBtnPhoto" title="Subir Imagen" id="upload-photo"></button>
                <button type="button" class="PubBtnFile" title="Adjuntar Archivo" id="upload-file"></button>
            </div>
            {{ form.media_url }}
        </form>
    </section>
</main>
      
      
      <footer class="MobileFooter">
        <div class="MobileDiv">
            <div class="MobileHome">
                <a href="{% url 'feed' %}" id="MobileHomeIcon"></a>
            </div>
            <div class="MobileChat">
                <a href="{% url 'feed-chat' %}" id="MobileChatIcon"></a>
            </div>
            <div class="MobilePublish">
                <a href="{% url 'feed-post' %}" id="MobilePublishIcon"></a>
            </div>
            <div class="MobileLike">
                <a href="{% url 'feed-notifications' %}" id="MobileLikeIcon"></a>
            </div>
            <div class="MobileProfile">
                <a href="{% url 'own-profile' %}" id="MobileProfileIcon"></a>
            </div>
        </div>
    </footer>
</body>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const textarea = document.querySelector('.PubTextarea');
    const preview = document.getElementById('PubPreview');
    
    // Actualizar vista previa
    textarea.addEventListener('input', function() {
        preview.textContent = this.value || "Vista previa de la publicación...";
    });
    
    // Manejar subida de imágenes (ejemplo con Cloudinary)
    document.getElementById('upload-photo').addEventListener('click', function() {
        cloudinary.openUploadWidget({ 
            cloudName: 'tu_cloud', 
            uploadPreset: 'tu_preset',
            sources: ['local', 'url']
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                document.getElementById('media-url-input').value = result.info.secure_url;
                preview.innerHTML += `<img src="${result.info.secure_url}" width="100">`;
            }
        });
    });
});
</script>
</html>
