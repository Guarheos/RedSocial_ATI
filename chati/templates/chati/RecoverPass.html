{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chATI - Red Social para Estudiantes</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/RecoverPassstyle.css' %}">
    <script src="{% static 'js/MobilePopup.js' %}"></script>
</head>
<body>
    <header>
        <img src="{% static 'images/Logo.png' %}" alt="Logo de chATI" id="LPLogo">
        <div class="LPHDiv">
            <a href="#" id="LPGlobe" onclick="toggleMobilePopup(event)"></a>
            <div id="MobilePopup" class="mobile-popup hidden">
              <a href="{% url 'index' %}">INICIO</a>
              <a href="{% url 'login' %}">INICIAR SESIÓN</a>
            </div>
          </div>
    </header>

    <main class="RPMain">
        <h1>Recuperar contraseña</h1>
        <div class="RPform-container">
            <div class="RPFInputs">            
                <p id="RPFEmail">Correo</p>
                <input type="text">
                <p id="RPFCEmail">Confirmar correo</p>
                <input type="text">
            </div>
            <div class="RPButton">
                <a href="{% url 'password_recover' %}" class="button">ENVIAR</a>
            </div>
            </div>
          </div>
    </main>
</body>
</html>
