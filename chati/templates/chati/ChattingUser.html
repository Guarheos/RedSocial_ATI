{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chATI - Red Social para Estudiantes</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/ChattingUserstyle.css' %}">
    <script src="{% static 'js/MobilePopup.js' %}"></script>
</head>
<body>
    <header>
        <div class="LogInDivRight">
            <div class="LogInSearch">
                <a href="#" id="LogInSearchIcon"></a>
            </div>
            <div class="LogInGlobe">
                <a href="#" id="LogInGlobeIcon"></a>
            </div>
            <div class="LogInLogout">
                <a href="{% url 'logout' %}" id="LogInLogoutLink">CERRAR SESIÓN</a>
            </div>
        </div>
        <div class="LogInChatUserContainer">
            <div class="MPUserPhoto"></div>
            <strong class="ChatUserName"> Usuario </strong>
        </div>
        <div class="LogInDivLeft">
            <div class="LogInPublish">
                <a href="{% url 'feed-post' %}" id="LogInPublishIcon"></a>
            </div>
            <div class="LogInChat">
                <a href="{% url 'feed-chat' %}" id="LogInChatIcon"></a>
            </div>
            <div class="LogInLike">
                <a href="{% url 'feed-notifications' %}" id="LogInLikeIcon"></a>
            </div>
            <div class="LogInProfile">
                <a href="{% url 'feed-profile' %}" id="LogInProfileIcon"></a>
            </div>
            <div class="LogInHome" onclick="toggleMobilePopup(event)">
                <a href="{% url 'feed' %}" id="LogInHomeIcon" data-feed="{% url 'feed' %}"></a>
            </div>
            <div id="MobilePopup" class="mobile-popup hidden">
              <a href="{% url 'logout' %}">CERRAR SESIÓN</a>
            </div>
        </div>
    </header>

    <main class="ChatMain">
        <section class="ChatBox">
          <div class="ChatMessages">
            <div class="Message from-other">Hola, ¿cómo estás?</div>
            <div class="Message from-user">¡Todo bien!, ¿Y tú?</div>
          </div>
      
          <div class="ChatInput">
            <textarea placeholder="Enviar mensaje..."></textarea>
      
            <div class="ChatActions">
              <div class="ChatTools">
                <button class="EmojiBtn" title="Emoji"></button>
                <button class="CameraBtn" title="Cámara"></button>
                <button class="FileBtn" title="Archivo"></button>
              </div>
              <button class="SendBtn" title="Enviar"></button>
            </div>
          </div>
        </section>
      </main>
      
      <footer class="MobileFooter">
        <div class="MobileDiv">
            <div class="MobileHome">
                <a href="{% url 'feed' %}" id="MobileHomeIcon"></a>
            </div>
            <div class="MobileChat">
                <a href="{% url 'feed-chat' %}" id="MobileChatIcon"></a>
            </div>
            <div class="MobilePublish">
                <a href="{% url 'feed-post' %}" id="MobilePublishIcon"></a>
            </div>
            <div class="MobileLike">
                <a href="{% url 'feed-notifications' %}" id="MobileLikeIcon"></a>
            </div>
            <div class="MobileProfile">
                <a href="{% url 'feed-profile' %}" id="MobileProfileIcon"></a>
            </div>
        </div>
    </footer>
</body>
</html>
