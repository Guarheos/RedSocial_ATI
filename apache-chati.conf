<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /app/REDSOCIAL_ATI-DJANGO 

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    Alias /static /app/REDSOCIAL_ATI-DJANGO/chati/static
    <Directory /app/REDSOCIAL_ATI-DJANGO/chati/static>
        Require all granted
    </Directory>

    <Directory /app/REDSOCIAL_ATI-DJANGO/mysite>
        Require all granted
        WSGIApplicationGroup %{GLOBAL}
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    WSGIDaemonProcess chati python-path=/app/REDSOCIAL_ATI-DJANGO:/app/env/lib/python3.10/site-packages processes=2 threads=1 display-name=%{GROUP} home=/app/REDSOCIAL_ATI-DJANGO
    
    WSGIProcessGroup chati
    
    WSGIScriptAlias / /app/REDSOCIAL_ATI-DJANGO/mysite/wsgi.py

</VirtualHost>